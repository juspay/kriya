name: Release and Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write
  id-token: write # Required for npm provenance via OIDC

jobs:
  test:
    name: 🧪 Pre-release Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  release:
    name: 🚀 Release
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for native OIDC publish support
        run: |
          npx -y npm@11 install -g npm@11
          echo "npm version: $(npm --version)"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Release with semantic-release
        id: semantic
        run: npx semantic-release@25
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          HUSKY: '0'

      - name: Setup Node for GitHub Packages
        if: success()
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@juspay'

      - name: Publish to GitHub Packages
        if: success()
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          echo "📦 Publishing to GitHub Packages..."
          LOG=$(npm publish --access public --registry https://npm.pkg.github.com 2>&1)
          STATUS=$?
          echo "$LOG"

          if [ $STATUS -eq 0 ]; then
            echo "✅ Published to GitHub Packages"
            exit 0
          fi

          # semantic-release didn't bump the version on this run, so the tag
          # already exists on the registry. That's expected when `npx
          # semantic-release` produces no release (e.g. chore-only commit) —
          # don't fail the job.
          if echo "$LOG" | grep -qE 'EPUBLISHCONFLICT|cannot publish over the previously published versions|409'; then
            echo "ℹ️  Version already exists on GitHub Packages — no new release to publish."
            exit 0
          fi

          echo "❌ GitHub Packages publish failed with exit code $STATUS"
          exit $STATUS
