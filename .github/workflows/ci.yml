name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: 🧪 Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check code formatting
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npm run type-check

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: ReScript bindings compile
        run: npm run build:rescript

  build-check:
    name: 📦 Build & Package Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Verify package contents
        run: |
          echo "📦 Dry-run packaging:"
          npm pack --dry-run
          echo ""
          echo "📂 dist/ contents:"
          ls -la dist/

  quality-gate:
    name: 🛡️ Code Quality & Security Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: 🔍 Build validation
        run: node scripts/build-validations.cjs

      - name: 📝 Commit message validation
        # On pull_request events, actions/checkout defaults to the ephemeral
        # merge commit (refs/pull/N/merge), so `git log -1` would return
        # "Merge … into …" — not the contributor's commit. Resolve the
        # contributor SHA explicitly.
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ -n "${HEAD_SHA:-}" ]; then
            COMMIT_SHA="$HEAD_SHA"
          else
            COMMIT_SHA="HEAD"
          fi
          COMMIT_MSG=$(git log -1 --pretty=format:"%s" "$COMMIT_SHA")
          echo "Validating: $COMMIT_MSG"
          node scripts/commit-validation.cjs "$COMMIT_MSG"

      - name: 🌍 Environment validation
        run: node scripts/env-validation.cjs

      - name: 🔒 Security check
        run: node scripts/security-check.cjs

      - name: 📈 TypeScript strict check
        run: npx tsc --noEmit --strict --project tsconfig.json

      - name: 📊 Quality metrics (non-blocking)
        id: metrics
        continue-on-error: true
        run: node scripts/quality-metrics.cjs --json-only

      - name: 📤 Upload quality metrics artifact
        if: always() && hashFiles('quality-metrics.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: quality-metrics-${{ github.sha }}
          path: quality-metrics.json
          retention-days: 14

      - name: 📋 Quality summary
        if: always()
        run: |
          echo "📋 Quality Gate Summary:"
          echo "✅ Build validation"
          echo "✅ Commit message format"
          echo "✅ Environment validation"
          echo "✅ Security check"
          echo "✅ TypeScript strict compilation"
          if [ -f quality-metrics.json ]; then
            echo ""
            echo "📊 Quality snapshot:"
            node -e "const m=require('./quality-metrics.json'); console.log('  Files:',m.files.fileCount,' LOC:',m.files.loc.code); console.log('  ESLint errors:',m.eslint.errors,' warnings:',m.eslint.warnings); console.log('  TODOs:',m.todos.total); console.log('  Audit critical:',m.audit.critical,' high:',m.audit.high);"
          fi
