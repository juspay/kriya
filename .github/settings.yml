# Repository settings for Kriya
# Applied by the "Settings" GitHub App: https://github.com/apps/settings

repository:
  name: kriya
  description: 'Pure automation execution engine for web actions. Execute action commands from any AI.'
  homepage: https://github.com/juspay/kriya
  topics:
    - automation
    - web-automation
    - kriya
    - form-filling
    - dom-manipulation
    - ai-actions
    - browser-automation
    - typescript
    - juspay

  private: false
  has_issues: true
  has_projects: false
  has_wiki: false
  has_downloads: true
  default_branch: main

  allow_squash_merge: true
  allow_merge_commit: false
  allow_rebase_merge: false
  delete_branch_on_merge: true
  allow_auto_merge: true

  squash_merge_commit_title: PR_TITLE
  squash_merge_commit_message: PR_BODY

  enable_automated_security_fixes: true
  enable_vulnerability_alerts: true

labels:
  - name: 'type: bug'
    color: 'd73a4a'
    description: "Something isn't working"
  - name: 'type: feature'
    color: '0075ca'
    description: 'New feature or request'
  - name: 'type: enhancement'
    color: 'a2eeef'
    description: 'Enhancement to existing functionality'
  - name: 'type: documentation'
    color: '0052cc'
    description: 'Improvements or additions to documentation'
  - name: 'type: refactor'
    color: '5319e7'
    description: 'Code refactoring'
  - name: 'type: performance'
    color: 'fbca04'
    description: 'Performance improvements'

  - name: 'priority: critical'
    color: 'b60205'
  - name: 'priority: high'
    color: 'd93f0b'
  - name: 'priority: medium'
    color: 'fbca04'
  - name: 'priority: low'
    color: '0e8a16'

  - name: 'status: triage'
    color: 'ededed'
  - name: 'status: in-progress'
    color: 'c5def5'
  - name: 'status: blocked'
    color: 'b60205'
  - name: 'status: needs-review'
    color: 'fbca04'

  - name: 'component: core'
    color: '1d76db'
  - name: 'component: actions'
    color: '1d76db'
  - name: 'component: forms'
    color: '1d76db'
  - name: 'component: context'
    color: '1d76db'
  - name: 'component: types'
    color: '1d76db'
  - name: 'component: ci'
    color: '1d76db'
  - name: 'component: docs'
    color: '1d76db'

  - name: dependencies
    color: '0366d6'
    description: 'Pull requests that update a dependency file'
  - name: github-actions
    color: '000000'
    description: 'Pull requests from Dependabot for GitHub Actions'
  - name: automated
    color: 'ededed'
    description: 'Automated PR (Dependabot, release bot, etc.)'
  - name: 'good first issue'
    color: '7057ff'
  - name: 'help wanted'
    color: '008672'

branches:
  - name: main
    protection:
      required_status_checks:
        strict: true
        contexts:
          - '🧪 Test (Node 20)'
          - '🧪 Test (Node 22)'
          - '📦 Build & Package Check'
          - '🛡️ Code Quality & Security Gate'
          - '🔒 Single Commit Policy Validation'
      enforce_admins: false
      required_linear_history: true
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: true
      restrictions: null
      allow_force_pushes: false
      allow_deletions: false
